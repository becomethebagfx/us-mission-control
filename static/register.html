<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%230073EA'/><text x='16' y='22' font-family='Inter,sans-serif' font-size='14' font-weight='700' fill='white' text-anchor='middle'>MC</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1C1F35 0%, #292F4C 50%, #3D4463 100%);
        }
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .logo {
            width: 48px;
            height: 48px;
            background: #0073EA;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo span {
            font-size: 16px;
            font-weight: 700;
            color: white;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #323338;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 13px;
            color: #676879;
            margin-bottom: 28px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #323338;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #D0D4E4;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: #323338;
            transition: border-color 0.15s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0073EA;
            box-shadow: 0 0 0 3px rgba(0, 115, 234, 0.1);
        }
        .register-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0073EA;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            transition: background 0.15s;
            margin-top: 4px;
        }
        .register-btn:hover { background: #0060C2; }
        .register-btn:disabled { background: #B0B4C0; cursor: not-allowed; }
        .error-msg {
            background: #FFF0F0;
            border: 1px solid #FFD4D4;
            color: #C4314B;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        .success-msg {
            background: #F0FFF4;
            border: 1px solid #C6F6D5;
            color: #276749;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        .login-link {
            margin-top: 20px;
            font-size: 13px;
            color: #676879;
        }
        .login-link a {
            color: #0073EA;
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .pw-hint {
            font-size: 11px;
            color: #9699A6;
            margin-top: 4px;
            text-align: left;
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #B0B4C0;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><span>MC</span></div>
        <h1>Create Account</h1>
        <p class="subtitle">Only authorized emails can register</p>

        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>

        <form id="register-form" onsubmit="return handleRegister(event)">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password" minlength="8">
                <p class="pw-hint">Must be at least 8 characters</p>
            </div>
            <div class="form-group">
                <label for="password-confirm">Confirm Password</label>
                <input type="password" id="password-confirm" name="password-confirm" placeholder="Confirm your password" required autocomplete="new-password">
            </div>
            <button type="submit" class="register-btn" id="register-btn">Create Account</button>
        </form>

        <p class="login-link">Already have an account? <a href="/auth/login-page">Sign in</a></p>

        <p class="footer">Authorized team members only</p>
    </div>

    <script>
        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password-confirm').value;

            if (!email || !password) return;

            if (password !== confirm) {
                showError('Passwords do not match.');
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';
            document.getElementById('error-msg').style.display = 'none';

            try {
                const resp = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name }),
                });

                const data = await resp.json();
                if (resp.ok && data.success) {
                    window.location.href = '/';
                } else {
                    showError(data.error || 'Registration failed. Please try again.');
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            } catch (err) {
                showError('Network error. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }
    </script>
</body>
</html>
