<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%230073EA'/><text x='16' y='22' font-family='Inter,sans-serif' font-size='14' font-weight='700' fill='white' text-anchor='middle'>MC</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1C1F35 0%, #292F4C 50%, #3D4463 100%);
        }
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .logo {
            width: 48px;
            height: 48px;
            background: #0073EA;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo span {
            font-size: 16px;
            font-weight: 700;
            color: white;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #323338;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 13px;
            color: #676879;
            margin-bottom: 32px;
        }
        .github-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #24292e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
            width: 100%;
            justify-content: center;
        }
        .github-btn:hover { background: #1a1e22; }
        .github-btn svg { width: 20px; height: 20px; }
        .error-msg {
            background: #FFF0F0;
            border: 1px solid #FFD4D4;
            color: #C4314B;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        .footer {
            margin-top: 28px;
            font-size: 11px;
            color: #B0B4C0;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><span>MC</span></div>
        <h1>Mission Control</h1>
        <p class="subtitle">Sign in to access the marketing dashboard</p>

        <div class="error-msg" id="error-msg"></div>

        <a href="/auth/login" class="github-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            Sign in with GitHub
        </a>

        <p class="footer">Authorized team members only</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        if (error) {
            const el = document.getElementById('error-msg');
            const msgs = {
                not_allowed: 'Your GitHub account is not authorized. Contact your admin.',
                token_failed: 'GitHub authentication failed. Please try again.',
                user_failed: 'Could not retrieve your GitHub profile. Please try again.',
                no_code: 'Authentication was cancelled. Please try again.',
                no_token: 'GitHub did not return an access token. Please try again.',
            };
            el.textContent = msgs[error] || 'Login failed. Please try again.';
            el.style.display = 'block';
        }
    </script>
</body>
</html>
